worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hardening + performance baseline
    server_tokens off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    client_max_body_size 2m;
    client_body_timeout 15s;
    client_header_timeout 15s;
    send_timeout 30s;
    reset_timedout_connection on;

    log_format main  - []  
                      
                     ;
    access_log /var/log/nginx/access.log main;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # Rate and connection limiting must be defined in http block.
    limit_req_zone $binary_remote_addr zone=api_ratelimit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_ratelimit:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=api_connlimit:10m;

    include /etc/nginx/conf.d/*.conf;
}

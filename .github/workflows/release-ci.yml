name: release-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  PYTHONHASHSEED: "0"
  TEST_RANDOM_SEED: "850"
  TZ: UTC

jobs:
  release-regression:
    name: release-regression
    runs-on: ubuntu-latest
    timeout-minutes: 40

    services:
      mongo:
        image: mongo:7
        ports:
          - 27018:27017
        options: >-
          --health-cmd "mongosh --quiet --eval \"db.runCommand({ ping: 1 }).ok\" || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/src/app/requirements.txt
            backend/src/app/requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run release regression bundle
        run: ./scripts/regression/release-regression.sh

  release-security-gates:
    name: release-security-gates
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      mongo:
        image: mongo:7
        ports:
          - 27018:27017
        options: >-
          --health-cmd "mongosh --quiet --eval \"db.runCommand({ ping: 1 }).ok\" || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run release security gates
        run: ./scripts/regression/release-security-gates.sh

  release-smoke:
    name: release-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run release smoke lane
        run: ./scripts/regression/release-smoke.sh

  rollback-drill:
    name: rollback-drill
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      mongo:
        image: mongo:7
        ports:
          - 27018:27017
        options: >-
          --health-cmd "mongosh --quiet --eval \"db.runCommand({ ping: 1 }).ok\" || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/src/app/requirements.txt
            backend/src/app/requirements-dev.txt

      - name: Run rollback drill lane
        run: ./scripts/regression/rollback-drill.sh

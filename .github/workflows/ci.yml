name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONHASHSEED: "0"
  TZ: UTC

jobs:
  backend:
    name: backend-quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mongo:
        image: mongo:7
        ports:
          - 27018:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend/src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/src/app/requirements.txt
            backend/src/app/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r app/requirements-dev.txt

      - name: Black
        run: black --check app tests

      - name: Ruff
        run: ruff check app tests

      - name: Pytest with coverage gate
        run: >-
          pytest tests -v
          --cov=app
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=80
          --junitxml=pytest-junit.xml

      - name: Upload backend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-artifacts
          path: |
            backend/src/pytest-junit.xml
            backend/src/coverage.xml
          if-no-files-found: error
          retention-days: 14

  frontend:
    name: frontend-quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --run --reporter=verbose

      - name: Build
        run: npm run build

      - name: Upload frontend build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 14

  ops-scripts:
    name: ops-scripts-quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run slice 740 script gates
        run: ./scripts/test-step-740.sh

  deploy:
    name: deploy-main
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend, frontend, ops-scripts]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deployment gate summary
        run: |
          echo "Main-branch deploy gate passed after backend and frontend quality gates." >> "$GITHUB_STEP_SUMMARY"
          echo "This job is intentionally blocked on pull_request events." >> "$GITHUB_STEP_SUMMARY"

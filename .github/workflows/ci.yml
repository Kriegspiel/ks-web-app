name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONHASHSEED: "0"
  TEST_RANDOM_SEED: "800"
  TZ: UTC

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mongo:
        image: mongo:7
        ports:
          - 27018:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/src/app/requirements.txt
            backend/src/app/requirements-dev.txt

      - name: Install backend dependencies
        working-directory: backend/src
        run: pip install -r app/requirements-dev.txt

      - name: Backend black
        working-directory: backend/src
        run: black --check app tests

      - name: Backend ruff
        working-directory: backend/src
        run: ruff check app tests

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

  backend-regression:
    name: backend-regression
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mongo:
        image: mongo:7
        ports:
          - 27018:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/src/app/requirements.txt
            backend/src/app/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend/src
        run: pip install -r app/requirements-dev.txt

      - name: Run backend regression lane
        run: ./scripts/regression/backend-regression.sh

      - name: Upload backend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-artifacts
          path: |
            backend/src/coverage.xml
          if-no-files-found: error
          retention-days: 14

  frontend-regression:
    name: frontend-regression
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run frontend regression lane
        run: ./scripts/regression/frontend-regression.sh

      - name: Upload frontend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: |
            frontend/coverage
          if-no-files-found: error
          retention-days: 14

  integration-smoke:
    name: integration-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mongo:
        image: mongo:7
        ports:
          - 27018:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/src/app/requirements.txt
            backend/src/app/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend/src
        run: pip install -r app/requirements-dev.txt

      - name: Run integration smoke lane
        run: ./scripts/regression/integration-smoke.sh

  ops-scripts:
    name: ops-scripts-quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run slice 740 script gates
        run: ./scripts/test-step-740.sh

  deploy:
    name: deploy-main
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, backend-regression, frontend-regression, integration-smoke, ops-scripts]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deployment gate summary
        run: |
          echo "Main-branch deploy gate passed after required Step 800 regression/lint gates." >> "$GITHUB_STEP_SUMMARY"
          echo "This job is intentionally blocked on pull_request events." >> "$GITHUB_STEP_SUMMARY"
